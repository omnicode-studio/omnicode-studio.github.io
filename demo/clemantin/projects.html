<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F1923">
  <title>Проекты домов — CLEMANTIN (demo)</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="images/logo.webp">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../_demo-frame.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-banner">
    <span data-i18n="demoBanner.text">Это демо-витрина. Заявки не передаются в реальную компанию.</span>
    <a href="../../" class="demo-banner__back" data-i18n="demoBanner.back">к портфолио</a>
  </div>

  <header class="header header--inner" id="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <img src="images/logo-white.webp" alt="CLEMANTIN" class="header__logo-img">
      </a>
      <nav class="header__nav" id="mainNav">
        <a href="index.html" class="header__nav-link" data-i18n="nav.home">Главная</a>
        <a href="services.html" class="header__nav-link" data-i18n="nav.services">Услуги</a>
        <a href="projects.html" class="header__nav-link active" data-i18n="nav.projects">Проекты домов</a>
        <a href="calculator.html" class="header__nav-link" data-i18n="nav.calculator">Калькулятор</a>
        <a href="contacts.html" class="header__nav-link" data-i18n="nav.contacts">Контакты</a>
      </nav>
      <div class="header__actions">
        <div class="lang-switch">
          <button class="lang-switch__btn" data-lang="ro">RO</button>
          <button class="lang-switch__btn active" data-lang="ru">RU</button>
        </div>
        <a href="contacts.html" class="btn btn--accent btn--sm header__cta" data-i18n="cta.btn">Оставить заявку</a>
      </div>
      <button class="header__burger" id="burgerBtn"><span></span><span></span><span></span></button>
    </div>
    <div class="mobile-nav" id="mobileNav">
      <div class="mobile-nav__header">
        <span class="mobile-nav__title">CLEMANTIN</span>
        <button class="mobile-nav__close" id="mobileNavClose">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <nav class="mobile-nav__links">
        <a href="index.html" class="mobile-nav__link" data-i18n="nav.home">Главная</a>
        <a href="services.html" class="mobile-nav__link" data-i18n="nav.services">Услуги</a>
        <a href="projects.html" class="mobile-nav__link active" data-i18n="nav.projects">Проекты домов</a>
        <a href="calculator.html" class="mobile-nav__link" data-i18n="nav.calculator">Калькулятор</a>
        <a href="contacts.html" class="mobile-nav__link" data-i18n="nav.contacts">Контакты</a>
      </nav>
    </div>
  </header>

  <main id="main-content" style="padding-top: calc(var(--df-banner-h, 32px) + 80px); padding-bottom: 80px;">
    <div class="container">
      <div class="page-head">
        <h1 class="page-title" data-i18n="nav.projects">Проекты домов</h1>
        <p class="page-subtitle">67 проектов — найдено: <span id="housesCount">0</span></p>
      </div>

      <div class="houses-filter">
        <div class="houses-filter__group">
          <label class="houses-filter__label">Этажей</label>
          <div class="houses-filter__btns" data-filter-group="floors">
            <button class="active" data-value="all">Все</button>
            <button data-value="1">1</button>
            <button data-value="2">2</button>
          </div>
        </div>
        <div class="houses-filter__group">
          <label class="houses-filter__label">Тип</label>
          <div class="houses-filter__btns" data-filter-group="type">
            <button class="active" data-value="all">Все</button>
            <button data-value="standard">Стандарт</button>
            <button data-value="mansard">С мансардой</button>
            <button data-value="cottage">Коттедж</button>
            <button data-value="premium">Премиум</button>
          </div>
        </div>
        <div class="houses-filter__group houses-filter__group--full">
          <label class="houses-filter__label">Бюджет до: <span id="priceValue">€ 0</span></label>
          <input type="range" id="priceRange" class="houses-filter__range" min="0" max="100000" value="100000">
        </div>
      </div>

      <div id="housesGrid" class="houses-grid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <p>&copy; 1999—<span id="copyrightYear">2026</span> CLEMANTIN S.R.L. — Demo by <a href="../../">OmniCode Studio</a></p>
      </div>
    </div>
  </footer>

  <button class="back-to-top" id="backToTop"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg></button>
  <div class="toast" id="toast"><span class="toast__text" id="toastText"></span></div>

  <script src="app.js"></script>
</body>
</html>
